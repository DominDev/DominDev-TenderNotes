<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#f7efe6">
    <title>TenderNotes</title>
    <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./css/styles.css?v=20260604-2">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar" id="topbar" hidden>
        <div class="brand-lockup">
          <img class="brand-lockup__mark" src="./assets/logo.svg" alt="" width="36" height="36">
          <div>
          <p class="topbar__eyebrow">TenderNotes</p>
          <h1 class="topbar__title" id="viewTitle">Dziennik</h1>
          </div>
        </div>
        <div class="topbar__actions">
          <button class="child-switcher" id="childSwitcherButton" type="button" hidden>
            <span class="child-avatar" id="childSwitcherAvatar" aria-hidden="true">TN</span>
            <span class="child-switcher__text">
              <span class="child-switcher__name" id="childSwitcherName">Dziecko</span>
              <span class="child-switcher__meta" id="childSwitcherMeta">Wybierz profil</span>
            </span>
          </button>
          <button class="icon-button notification-button" id="notificationButton" type="button" aria-label="Powiadomienia" title="Powiadomienia" hidden>
            <svg class="icon-button__svg" aria-hidden="true" viewBox="0 0 24 24">
              <path d="M18 9.5A6 6 0 0 0 6 9.5c0 5-2 5.8-2 7h16c0-1.2-2-2-2-7Z" />
              <path d="M10 19a2 2 0 0 0 4 0" />
            </svg>
            <span class="notification-button__badge" id="notificationBadge">0</span>
          </button>
          <button class="icon-button" id="logoutButton" type="button" aria-label="Wyloguj" title="Wyloguj">
            <svg class="icon-button__svg" aria-hidden="true" viewBox="0 0 24 24">
              <path d="M10 6H6.8A1.8 1.8 0 0 0 5 7.8v8.4A1.8 1.8 0 0 0 6.8 18H10" />
              <path d="M14 8l4 4-4 4" />
              <path d="M9 12h9" />
            </svg>
          </button>
        </div>
      </header>

      <main class="main" id="app">
        <section class="loading">
          <p class="loading__brand">TenderNotes</p>
          <p class="loading__text">Ładowanie aplikacji...</p>
        </section>
      </main>

      <nav class="tabbar" id="tabbar" aria-label="Główna nawigacja" hidden>
        <button class="tabbar__button" type="button" data-route="dashboard">
          <span class="tabbar__icon" aria-hidden="true">⌂</span>
          <span>Start</span>
        </button>
        <button class="tabbar__button" type="button" data-route="entry">
          <span class="tabbar__icon" aria-hidden="true">＋</span>
          <span>Wpis</span>
        </button>
        <button class="tabbar__button" type="button" data-route="history">
          <span class="tabbar__icon" aria-hidden="true">≡</span>
          <span>Dni</span>
        </button>
        <button class="tabbar__button" type="button" data-route="report">
          <span class="tabbar__icon" aria-hidden="true">⌁</span>
          <span>Raport</span>
        </button>
      </nav>
    </div>

    <script type="module" src="./js/app.js?v=20260604-3"></script>
  </body>
</html>
